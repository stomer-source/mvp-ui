<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사당역 이동 선택 도우미</title>
    <meta
      name="description"
      content="사당역에서 7800번 버스와 지하철 중 어떤 선택이 더 나은지 비교해주는 실험용 웹사이트"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="chat-page">
      <section class="chat-hero">
        <div class="chat-shell">
          <p class="eyebrow">SADANG</p>
          <h1>사당역, 뭐 탈까?</h1>
          <p class="lead">
            요일과 시간만 고르면 바로 추천합니다.
          </p>

          <div class="chat-composer" role="search">
            <div class="composer-row">
              <input
                id="departure"
                type="time"
                value="08:30"
                aria-label="시간 입력"
              />
              <button class="apple-button primary" id="refreshBtn" type="button">물어보기</button>
            </div>
            <div class="composer-meta">
              <label>
                요일
                <select id="weekday">
                  <option value="mon">월요일</option>
                  <option value="tue">화요일</option>
                  <option value="wed">수요일</option>
                  <option value="thu">목요일</option>
                  <option value="fri">금요일</option>
                  <option value="sat">토요일</option>
                  <option value="sun">일요일</option>
                </select>
              </label>
            </div>
          </div>

          <section class="answer-panel" id="answerPanel" aria-live="polite" hidden>
            <div class="answer-header">
              <div>
                <p class="answer-kicker">7800번 버스 분석</p>
                <h2 id="decisionText">요일과 시간을 선택하세요</h2>
              </div>
              <span class="answer-state" id="subNavState">샘플 데이터</span>
            </div>
            <p id="decisionSub" class="body-copy">
              물어보기를 누르면 7800번 버스의 다음 도착과 대략 남는 자리를 보여줍니다.
            </p>

            <div class="compare-grid">
              <article class="compare-card compare-bus">
                <div class="compare-head">
                  <span class="compare-label">도착 예상</span>
                  <strong id="busArrival">-</strong>
                </div>
                <ul class="compare-list">
                  <li><span>다음 도착</span><strong id="busNext">-</strong></li>
                  <li><span>배차 간격</span><strong id="busHeadway">-</strong></li>
                  <li><span>운행 상태</span><strong id="busService">-</strong></li>
                </ul>
                <p id="busNote" class="compare-note">사당역 9번 출구 기준의 도착 예측이 여기 표시됩니다.</p>
              </article>

              <article class="compare-card compare-subway">
                <div class="compare-head">
                  <span class="compare-label">좌석 예상</span>
                  <strong id="seatSummary">-</strong>
                </div>
                <ul class="compare-list">
                  <li><span>차량 좌석 수</span><strong id="seatCapacity">-</strong></li>
                  <li><span>예상 남은 좌석</span><strong id="seatRemain">-</strong></li>
                  <li><span>차량 구성</span><strong id="busTypeMix">-</strong></li>
                </ul>
                <p id="seatNote" class="compare-note">일반버스와 2층버스를 함께 고려한 대략값입니다.</p>
              </article>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
